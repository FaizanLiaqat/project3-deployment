<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard — DocVault</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --ink: #0d0d0d;
        --paper: #f5f2eb;
        --accent: #c84b31;
        --accent2: #2e6fad;
        --muted: #7a7570;
        --border: #d8d3ca;
        --card: #ffffff;
        --success: #2d8a4e;
        --error: #c84b31;
        --sidebar-w: 260px;
      }

      body {
        font-family: "DM Sans", sans-serif;
        background: var(--paper);
        min-height: 100vh;
        display: flex;
      }

      /* SIDEBAR */
      .sidebar {
        width: var(--sidebar-w);
        background: var(--ink);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        padding: 32px 24px;
        position: fixed;
        top: 0;
        left: 0;
        bottom: 0;
        overflow-y: auto;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 48px;
      }

      .brand-icon {
        width: 34px;
        height: 34px;
        background: var(--accent);
        border-radius: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 16px;
      }

      .brand-name {
        font-family: "Syne", sans-serif;
        font-weight: 800;
        font-size: 18px;
        color: #fff;
        letter-spacing: -0.3px;
      }

      .nav-section {
        margin-bottom: 8px;
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 1.5px;
        color: rgba(255, 255, 255, 0.3);
        text-transform: uppercase;
        padding: 0 8px;
      }

      .nav-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 12px;
        border-radius: 8px;
        color: rgba(255, 255, 255, 0.6);
        font-size: 14px;
        cursor: pointer;
        transition:
          background 0.15s,
          color 0.15s;
        margin-bottom: 2px;
        text-decoration: none;
      }

      .nav-item:hover {
        background: rgba(255, 255, 255, 0.08);
        color: #fff;
      }
      .nav-item.active {
        background: rgba(255, 255, 255, 0.12);
        color: #fff;
      }
      .nav-item .icon {
        font-size: 16px;
        width: 20px;
        text-align: center;
      }

      .sidebar-spacer {
        flex: 1;
      }

      .user-card {
        border-top: 1px solid rgba(255, 255, 255, 0.1);
        padding-top: 20px;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .avatar {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        background: var(--accent2);
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "Syne", sans-serif;
        font-weight: 700;
        font-size: 14px;
        color: #fff;
        flex-shrink: 0;
      }

      .user-info {
        flex: 1;
        min-width: 0;
      }
      .user-name {
        font-size: 13px;
        font-weight: 500;
        color: #fff;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .user-role {
        font-size: 11px;
        color: rgba(255, 255, 255, 0.4);
      }

      .logout-btn {
        background: none;
        border: none;
        color: rgba(255, 255, 255, 0.4);
        cursor: pointer;
        font-size: 16px;
        padding: 4px;
        transition: color 0.15s;
      }
      .logout-btn:hover {
        color: var(--accent);
      }

      /* MAIN */
      .main {
        margin-left: var(--sidebar-w);
        flex: 1;
        display: flex;
        flex-direction: column;
      }

      .topbar {
        background: var(--card);
        border-bottom: 1px solid var(--border);
        padding: 0 40px;
        height: 64px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        position: sticky;
        top: 0;
        z-index: 10;
      }

      .page-title {
        font-family: "Syne", sans-serif;
        font-size: 18px;
        font-weight: 700;
        color: var(--ink);
        letter-spacing: -0.3px;
      }

      .topbar-right {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .badge {
        background: var(--paper);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 4px 12px;
        font-size: 12px;
        color: var(--muted);
      }

      .content {
        padding: 40px;
        flex: 1;
      }

      /* PROFILE CARD */
      .section-title {
        font-family: "Syne", sans-serif;
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 1.2px;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 16px;
      }

      .profile-card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 28px 32px;
        display: flex;
        align-items: center;
        gap: 24px;
        margin-bottom: 40px;
      }

      .profile-avatar {
        width: 72px;
        height: 72px;
        border-radius: 50%;
        background: linear-gradient(135deg, var(--accent2), #1a4a7a);
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "Syne", sans-serif;
        font-weight: 800;
        font-size: 28px;
        color: #fff;
        flex-shrink: 0;
      }

      .profile-info {
        flex: 1;
      }

      .profile-name {
        font-family: "Syne", sans-serif;
        font-size: 22px;
        font-weight: 700;
        color: var(--ink);
        letter-spacing: -0.5px;
        margin-bottom: 4px;
      }

      .profile-meta {
        display: flex;
        gap: 20px;
        flex-wrap: wrap;
      }

      .meta-item {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 13px;
        color: var(--muted);
      }

      .meta-item .dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--success);
      }

      .profile-stats {
        display: flex;
        gap: 32px;
      }

      .stat {
        text-align: center;
      }

      .stat-num {
        font-family: "Syne", sans-serif;
        font-size: 24px;
        font-weight: 800;
        color: var(--ink);
      }

      .stat-label {
        font-size: 11px;
        color: var(--muted);
        margin-top: 2px;
        letter-spacing: 0.5px;
      }

      .stat-divider {
        width: 1px;
        background: var(--border);
        align-self: stretch;
      }

      /* UPLOAD SECTION */
      .upload-area {
        background: var(--card);
        border: 2px dashed var(--border);
        border-radius: 12px;
        padding: 40px;
        text-align: center;
        transition:
          border-color 0.2s,
          background 0.2s;
        cursor: pointer;
        margin-bottom: 40px;
        position: relative;
      }

      .upload-area:hover,
      .upload-area.drag-over {
        border-color: var(--accent2);
        background: #f0f6ff;
      }

      .upload-area input[type="file"] {
        position: absolute;
        inset: 0;
        opacity: 0;
        cursor: pointer;
        width: 100%;
        height: 100%;
      }

      .upload-icon {
        font-size: 40px;
        margin-bottom: 12px;
      }

      .upload-title {
        font-family: "Syne", sans-serif;
        font-size: 16px;
        font-weight: 700;
        color: var(--ink);
        margin-bottom: 6px;
      }

      .upload-sub {
        font-size: 13px;
        color: var(--muted);
        margin-bottom: 16px;
      }

      .selected-file {
        display: none;
        background: var(--paper);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 10px 16px;
        font-size: 13px;
        color: var(--ink);
        margin: 0 auto;
        max-width: 400px;
        align-items: center;
        gap: 8px;
        justify-content: space-between;
      }
      .selected-file.show {
        display: flex;
      }

      .file-name {
        font-weight: 500;
        truncate: ellipsis;
        max-width: 260px;
        overflow: hidden;
        white-space: nowrap;
      }
      .file-size {
        color: var(--muted);
        font-size: 11px;
        flex-shrink: 0;
      }

      .upload-actions {
        display: flex;
        gap: 12px;
        margin-top: 16px;
        justify-content: center;
      }

      .btn-upload {
        padding: 10px 24px;
        background: var(--accent2);
        color: #fff;
        border: none;
        border-radius: 8px;
        font-family: "Syne", sans-serif;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition:
          transform 0.15s,
          background 0.2s;
      }

      .btn-upload:hover {
        background: #1e5a9c;
        transform: translateY(-1px);
      }
      .btn-upload:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: none;
      }

      .btn-clear {
        padding: 10px 20px;
        background: none;
        color: var(--muted);
        border: 1.5px solid var(--border);
        border-radius: 8px;
        font-family: "DM Sans", sans-serif;
        font-size: 14px;
        cursor: pointer;
        transition:
          border-color 0.2s,
          color 0.2s;
      }
      .btn-clear:hover {
        border-color: var(--muted);
        color: var(--ink);
      }

      /* PROGRESS */
      .progress-wrap {
        display: none;
        margin-top: 16px;
      }
      .progress-wrap.show {
        display: block;
      }

      .progress-bar-track {
        background: var(--border);
        border-radius: 4px;
        height: 6px;
        overflow: hidden;
      }

      .progress-bar-fill {
        height: 100%;
        background: var(--accent2);
        border-radius: 4px;
        transition: width 0.3s ease;
        width: 0%;
      }

      .progress-label {
        font-size: 12px;
        color: var(--muted);
        margin-top: 6px;
        text-align: center;
      }

      /* ALERT */
      .alert {
        padding: 12px 16px;
        border-radius: 8px;
        font-size: 13px;
        margin-bottom: 20px;
        display: none;
        animation: slideIn 0.2s ease;
      }
      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateY(-6px);
        }
        to {
          opacity: 1;
          transform: none;
        }
      }
      .alert.success {
        background: #e8f5ee;
        color: var(--success);
        border: 1px solid #b8ddc8;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .alert.error {
        background: #fdf0ee;
        color: var(--error);
        border: 1px solid #f0c4bb;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      /* PDF LIST */
      .pdf-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 16px;
      }

      .pdf-card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 20px;
        display: flex;
        align-items: flex-start;
        gap: 14px;
        transition:
          box-shadow 0.2s,
          transform 0.2s;
      }

      .pdf-card:hover {
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        transform: translateY(-2px);
      }

      .pdf-thumb {
        width: 44px;
        height: 44px;
        background: #fdf0ee;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 22px;
        flex-shrink: 0;
      }

      .pdf-info {
        flex: 1;
        min-width: 0;
      }

      .pdf-title {
        font-size: 14px;
        font-weight: 500;
        color: var(--ink);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        margin-bottom: 4px;
      }

      .pdf-meta {
        font-size: 11px;
        color: var(--muted);
      }

      .pdf-actions {
        display: flex;
        gap: 6px;
        margin-top: 10px;
      }

      .pdf-btn {
        padding: 5px 10px;
        border-radius: 6px;
        font-size: 12px;
        cursor: pointer;
        border: 1px solid var(--border);
        background: none;
        color: var(--muted);
        transition:
          background 0.15s,
          color 0.15s;
      }
      .pdf-btn:hover {
        background: var(--paper);
        color: var(--ink);
      }
      .pdf-btn.danger:hover {
        background: #fdf0ee;
        color: var(--error);
        border-color: #f0c4bb;
      }

      .empty-state {
        text-align: center;
        padding: 60px 0;
        color: var(--muted);
      }
      .empty-state .icon {
        font-size: 48px;
        margin-bottom: 12px;
      }
      .empty-state p {
        font-size: 14px;
      }

      .loading-state {
        text-align: center;
        padding: 40px;
        color: var(--muted);
        font-size: 14px;
      }

      /* SPINNER */
      .spinner {
        display: inline-block;
        width: 14px;
        height: 14px;
        border: 2px solid rgba(255, 255, 255, 0.3);
        border-top-color: #fff;
        border-radius: 50%;
        animation: spin 0.6s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      @media (max-width: 900px) {
        .sidebar {
          transform: translateX(-100%);
          z-index: 100;
        }
        .main {
          margin-left: 0;
        }
        .profile-card {
          flex-direction: column;
          align-items: flex-start;
        }
        .profile-stats {
          margin-top: 16px;
        }
      }
    </style>
  </head>
  <body>
    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-icon">📄</div>
        <span class="brand-name">DocVaults</span>
      </div>

      <div class="nav-section">Main</div>
      <a class="nav-item active" href="dashboard.html">
        <span class="icon">🏠</span> Dashboard
      </a>
      <a class="nav-item" href="#" onclick="scrollToUpload(event)">
        <span class="icon">⬆️</span> Upload PDF
      </a>
      <a class="nav-item" href="#" onclick="scrollToDocs(event)">
        <span class="icon">📂</span> My Documents
      </a>

      <div class="sidebar-spacer"></div>

      <div class="user-card">
        <div class="avatar" id="sidebar-avatar">?</div>
        <div class="user-info">
          <div class="user-name" id="sidebar-username">Loading…</div>
          <div class="user-role">Member</div>
        </div>
        <button class="logout-btn" onclick="logout()" title="Sign out">
          ⏻
        </button>
      </div>
    </aside>

    <!-- MAIN -->
    <main class="main">
      <div class="topbar">
        <div class="page-title">Dashboard</div>
        <div class="topbar-right">
          <span class="badge" id="topbar-date"></span>
        </div>
      </div>

      <div class="content">
        <!-- PROFILE -->
        <div class="section-title">Your Profile</div>
        <div class="profile-card" id="profile-card">
          <div class="profile-avatar" id="profile-avatar">?</div>
          <div class="profile-info">
            <div class="profile-name" id="profile-name">Loading…</div>
            <div class="profile-meta">
              <div class="meta-item">
                <div class="dot"></div>
                <span id="profile-email">—</span>
              </div>
              <div class="meta-item">@<span id="profile-username">—</span></div>
              <div class="meta-item">
                Joined <span id="profile-joined">—</span>
              </div>
            </div>
          </div>
          <div class="profile-stats">
            <div class="stat">
              <div class="stat-num" id="stat-docs">—</div>
              <div class="stat-label">Documents</div>
            </div>
            <div class="stat-divider"></div>
            <div class="stat">
              <div class="stat-num" id="stat-size">—</div>
              <div class="stat-label">Total Size</div>
            </div>
          </div>
        </div>

        <!-- UPLOAD -->
        <div class="section-title" id="upload-section">Upload Document</div>
        <div class="alert" id="upload-alert"></div>

        <div class="upload-area" id="upload-area">
          <input
            type="file"
            id="file-input"
            accept=".pdf,application/pdf"
            onchange="onFileSelect(event)"
          />
          <div class="upload-icon">📤</div>
          <div class="upload-title">Drop your PDF here</div>
          <div class="upload-sub">or click to browse · Max 10 MB</div>

          <div class="selected-file" id="selected-file">
            <span>📄</span>
            <span class="file-name" id="file-name">—</span>
            <span class="file-size" id="file-size">—</span>
          </div>
        </div>

        <div class="upload-actions" id="upload-actions" style="display: none">
          <button class="btn-upload" id="upload-btn" onclick="uploadPDF()">
            Upload PDF
          </button>
          <button class="btn-clear" onclick="clearFile()">Clear</button>
        </div>

        <div class="progress-wrap" id="progress-wrap">
          <div class="progress-bar-track">
            <div class="progress-bar-fill" id="progress-fill"></div>
          </div>
          <div class="progress-label" id="progress-label">Uploading…</div>
        </div>

        <!-- DOCUMENTS -->
        <div class="section-title" style="margin-top: 40px" id="docs-section">
          My Documents
        </div>
        <div id="pdf-list">
          <div class="loading-state">Loading your documents…</div>
        </div>
      </div>
    </main>

    <script>
      const EC2_IP = "3.93.126.10";
      const AUTH_URL = window.AUTH_URL || `http://${EC2_IP}:30083`; // Auth Service
      const BACKEND_URL = window.BACKEND_URL || `http://${EC2_IP}:30082`; // Backend Service

      let token = localStorage.getItem("token");
      let user = null;
      let selectedFile = null;

      // Auth guard
      if (!token) window.location.href = "signin.html";

      // Init date
      document.getElementById("topbar-date").textContent =
        new Date().toLocaleDateString("en-US", {
          weekday: "short",
          month: "short",
          day: "numeric",
        });

      async function init() {
        // Verify token with auth service
        try {
          const res = await fetch(`${AUTH_URL}/auth/verify`, {
            headers: { Authorization: `Bearer ${token}` },
          });
          if (!res.ok) {
            logout();
            return;
          }
          const data = await res.json();
          user = data.user;
        } catch {
          logout();
          return;
        }

        // Fetch full profile from backend
        try {
          const res = await fetch(`${BACKEND_URL}/api/profile`, {
            headers: { Authorization: `Bearer ${token}` },
          });
          if (res.ok) {
            const profile = await res.json();
            user = { ...user, ...profile };
          }
        } catch {}

        renderProfile();
        loadDocuments();
      }

      function renderProfile() {
        const initials =
          (
            (user.first_name?.[0] || "") + (user.last_name?.[0] || "")
          ).toUpperCase() ||
          user.username?.[0]?.toUpperCase() ||
          "?";
        const fullName =
          [user.first_name, user.last_name].filter(Boolean).join(" ") ||
          user.username;

        document.getElementById("profile-avatar").textContent = initials;
        document.getElementById("profile-name").textContent = fullName;
        document.getElementById("profile-email").textContent =
          user.email || "—";
        document.getElementById("profile-username").textContent =
          user.username || "—";
        document.getElementById("profile-joined").textContent = user.created_at
          ? new Date(user.created_at).toLocaleDateString("en-US", {
              month: "short",
              year: "numeric",
            })
          : "—";

        document.getElementById("sidebar-avatar").textContent = initials;
        document.getElementById("sidebar-username").textContent = fullName;
      }

      async function loadDocuments() {
        const listEl = document.getElementById("pdf-list");
        try {
          const res = await fetch(`${BACKEND_URL}/api/documents`, {
            headers: { Authorization: `Bearer ${token}` },
          });
          if (!res.ok) throw new Error();
          const docs = await res.json();

          document.getElementById("stat-docs").textContent = docs.length;
          const totalBytes = docs.reduce((s, d) => s + (d.file_size || 0), 0);
          document.getElementById("stat-size").textContent =
            formatSize(totalBytes);

          if (docs.length === 0) {
            listEl.innerHTML = `<div class="empty-state"><div class="icon">📭</div><p>No documents yet. Upload your first PDF above.</p></div>`;
            return;
          }

          listEl.innerHTML = `<div class="pdf-grid">${docs.map(renderDocCard).join("")}</div>`;
        } catch {
          listEl.innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><p>Could not load documents.</p></div>`;
        }
      }

      function renderDocCard(doc) {
        const date = doc.created_at
          ? new Date(doc.created_at).toLocaleDateString("en-US", {
              month: "short",
              day: "numeric",
              year: "numeric",
            })
          : "—";
        return `
      <div class="pdf-card" id="doc-${doc.id}">
        <div class="pdf-thumb">📄</div>
        <div class="pdf-info">
          <div class="pdf-title" title="${escHtml(doc.original_name)}">${escHtml(doc.original_name)}</div>
          <div class="pdf-meta">${formatSize(doc.file_size)} · ${date}</div>
          <div class="pdf-actions">
            <button class="pdf-btn" onclick="downloadDoc(${doc.id}, '${escHtml(doc.original_name)}')">⬇ Download</button>
            <button class="pdf-btn danger" onclick="deleteDoc(${doc.id})">🗑 Delete</button>
          </div>
        </div>
      </div>`;
      }

      // FILE SELECT
      function onFileSelect(e) {
        const file = e.target.files[0];
        if (!file) return;
        validateAndSet(file);
      }

      function validateAndSet(file) {
        clearUploadAlert();
        if (file.type !== "application/pdf" && !file.name.endsWith(".pdf")) {
          showUploadAlert("Only PDF files are allowed.", "error");
          return;
        }
        if (file.size > 10 * 1024 * 1024) {
          showUploadAlert("File exceeds 10 MB limit.", "error");
          return;
        }
        selectedFile = file;
        document.getElementById("file-name").textContent = file.name;
        document.getElementById("file-size").textContent = formatSize(
          file.size,
        );
        document.getElementById("selected-file").classList.add("show");
        document.getElementById("upload-actions").style.display = "flex";
      }

      function clearFile() {
        selectedFile = null;
        document.getElementById("file-input").value = "";
        document.getElementById("selected-file").classList.remove("show");
        document.getElementById("upload-actions").style.display = "none";
        document.getElementById("progress-wrap").classList.remove("show");
        clearUploadAlert();
      }

      // DRAG & DROP
      const uploadArea = document.getElementById("upload-area");
      uploadArea.addEventListener("dragover", (e) => {
        e.preventDefault();
        uploadArea.classList.add("drag-over");
      });
      uploadArea.addEventListener("dragleave", () =>
        uploadArea.classList.remove("drag-over"),
      );
      uploadArea.addEventListener("drop", (e) => {
        e.preventDefault();
        uploadArea.classList.remove("drag-over");
        const file = e.dataTransfer.files[0];
        if (file) validateAndSet(file);
      });

      // UPLOAD
      async function uploadPDF() {
        if (!selectedFile) return;
        const btn = document.getElementById("upload-btn");
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span>';

        document.getElementById("progress-wrap").classList.add("show");
        document.getElementById("progress-fill").style.width = "0%";
        document.getElementById("progress-label").textContent = "Uploading…";

        clearUploadAlert();

        try {
          const formData = new FormData();
          formData.append("pdf", selectedFile);

          // Simulate progress while uploading
          let fakeProgress = 0;
          const progressInterval = setInterval(() => {
            fakeProgress = Math.min(fakeProgress + 8, 85);
            document.getElementById("progress-fill").style.width =
              fakeProgress + "%";
          }, 200);

          const res = await fetch(`${BACKEND_URL}/api/upload`, {
            method: "POST",
            headers: { Authorization: `Bearer ${token}` },
            body: formData,
          });

          clearInterval(progressInterval);
          document.getElementById("progress-fill").style.width = "100%";
          document.getElementById("progress-label").textContent = "Processing…";

          const data = await res.json();

          if (!res.ok) {
            showUploadAlert(
              data.error || "Upload failed. Please try again.",
              "error",
            );
            document.getElementById("progress-wrap").classList.remove("show");
            return;
          }

          showUploadAlert("✓ PDF uploaded successfully!", "success");
          setTimeout(() => {
            clearFile();
            loadDocuments();
          }, 1500);
        } catch {
          showUploadAlert(
            "Network error. Please check your connection.",
            "error",
          );
          document.getElementById("progress-wrap").classList.remove("show");
        } finally {
          btn.disabled = false;
          btn.innerHTML = "Upload PDF";
        }
      }

      // DOWNLOAD
      async function downloadDoc(id, name) {
        try {
          const res = await fetch(
            `${BACKEND_URL}/api/documents/${id}/download`,
            {
              headers: { Authorization: `Bearer ${token}` },
            },
          );
          if (!res.ok) throw new Error();
          const blob = await res.blob();
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url;
          a.download = name;
          a.click();
          URL.revokeObjectURL(url);
        } catch {
          alert("Download failed.");
        }
      }

      // DELETE
      async function deleteDoc(id) {
        if (!confirm("Delete this document? This cannot be undone.")) return;
        try {
          const res = await fetch(`${BACKEND_URL}/api/documents/${id}`, {
            method: "DELETE",
            headers: { Authorization: `Bearer ${token}` },
          });
          if (!res.ok) throw new Error();
          document.getElementById("doc-" + id)?.remove();

          // Refresh stats
          loadDocuments();
        } catch {
          alert("Delete failed.");
        }
      }

      // HELPERS
      function formatSize(bytes) {
        if (!bytes) return "0 B";
        if (bytes < 1024) return bytes + " B";
        if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + " KB";
        return (bytes / (1024 * 1024)).toFixed(2) + " MB";
      }

      function escHtml(str) {
        return String(str).replace(
          /[&<>"']/g,
          (c) =>
            ({
              "&": "&amp;",
              "<": "&lt;",
              ">": "&gt;",
              '"': "&quot;",
              "'": "&#39;",
            })[c],
        );
      }

      function showUploadAlert(msg, type) {
        const el = document.getElementById("upload-alert");
        el.textContent = msg;
        el.className = "alert " + type;
      }

      function clearUploadAlert() {
        document.getElementById("upload-alert").className = "alert";
      }

      function logout() {
        localStorage.removeItem("token");
        localStorage.removeItem("user");
        window.location.href = "signin.html";
      }

      function scrollToUpload(e) {
        e.preventDefault();
        document
          .getElementById("upload-section")
          .scrollIntoView({ behavior: "smooth" });
      }
      function scrollToDocs(e) {
        e.preventDefault();
        document
          .getElementById("docs-section")
          .scrollIntoView({ behavior: "smooth" });
      }

      init();
    </script>
  </body>
</html>
