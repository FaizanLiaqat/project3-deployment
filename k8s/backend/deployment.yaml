apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: default
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
          securityContext:
            fsGroup: 1000
      containers:
        - name: backend
          image: faizanliaqat/backend:f2a2e2aafd71084f197f159072b767901e7cf131
          imagePullPolicy: Always
          ports:
            - containerPort: 3001
              env:
                - name: NODE_ENV
                  value: "production"
                - name: DB_HOST
                  value: "postgres"
                - name: DB_PORT
                  value: "5432"
                - name: DB_NAME
                  valueFrom:
                    secretKeyRef:
                      name: app-secrets
                      key: POSTGRES_DB
                - name: DB_USER
                  valueFrom:
                    secretKeyRef:
                      name: app-secrets
                      key: POSTGRES_USER
                - name: DB_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: app-secrets
                      key: POSTGRES_PASSWORD
                - name: JWT_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: app-secrets
                      key: jwt-secret
                - name: UPLOAD_DIR
                  value: "/mnt/pdfs"
              volumeMounts:
                - name: pdfs-storage
                  mountPath: /mnt/pdfs
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
          volumes:
            - name: pdfs-storage
              persistentVolumeClaim:
                claimName: pdfs-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: default
spec:
  selector:
    app: backend
  ports:
    - protocol: TCP
      port: 3001
      targetPort: 3001
      nodePort: 30082
  type: NodePort
